<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Generator</title>
</head>

<body>
    <!-- To run this file install "Live Server" extension and right the file from navigation bar and select "Open with Live Server" -->

    <!-- Use this element to get to the next stop -->
     <button id="next-stop">Next Stop</button>

     <script>
        function* getStop() {
            yield "Poughkeepsie";
            yield "Newburgh";
            yield "Peekskill";
            yield "Yonkers";
            yield "Bronx";
            yield "Grand Central";
        }

        const nycTrainLine = getStop();
        const nextStopButton = document.querySelector("#next-stop");
        nextStopButton.addEventListener('click', () => {
            let currStop = nycTrainLine.next();
            if (currStop.done) {
                console.log("We made it!");
                nextStopButton.setAttribute("disabled", true);
            } else {
                console.log(currStop.value);
            }
        })
     </script>
    
</body>
</html>
