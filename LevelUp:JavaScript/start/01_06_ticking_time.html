<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticking Time</title>
</head>

<body>
    <!-- To run this file install "Live Server" extension and right the file from navigation bar and select "Open with Live Server" -->

    <!-- Use this element to render your clock -->
     <div id="clock"></div>

     <script>
        // Write your code here 
        function clock() {
            const clockNode = document.querySelector('#clock');
            return setInterval(() => {
                let date = new Date();
                let tick = date.toLocaleTimeString();
                clockNode.textContent = tick;
            }, 1000);
        }
        clock();
     </script>
    
</body>
</html>
